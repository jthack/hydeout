<head>
  <link href="http://gmpg.org/xfn/11" rel="profile" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />

  <!-- Enable responsiveness on mobile devices-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

  <title>
    {% if page.title == "Home" %}
      {{ site.title }}{% if site.tagline %} &middot; {{ site.tagline }}{% endif %}
    {% else %}
      {{ page.title }} &middot; {{ site.title }}
    {% endif %}
  </title>

  {% include google-analytics.html %}

  <!-- CSS -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css" />
  {% include font-includes.html %}

  <!-- Icons -->
  {% include favicons.html %}

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="RSS" href="/{{ site.feed.path | default: 'feed.xml' }}" />

  <!-- Canonical + structured data (added for SEO) -->
  <link rel="canonical" href="{{ page.url | absolute_url }}" />
  {% if page.layout == 'post' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": {{ page.title | jsonify }},
    "description": {{ page.description | default: page.excerpt | strip_html | truncate: 300 | jsonify }},
    "image": "{{ page.image | default: '/assets/images/joseph_circle.png' | absolute_url }}",
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
    "url": "{{ page.url | absolute_url }}",
    "mainEntityOfPage": {"@type": "WebPage", "@id": "{{ page.url | absolute_url }}"},
    "author": {
      "@type": "Person", "name": "Joseph Thacker", "alternateName": "rez0",
      "url": "https://josephthacker.com/",
      "sameAs": ["https://x.com/rez0__","https://hackerone.com/rez0","https://www.linkedin.com/in/josephthacker","https://github.com/jthack","https://ctbb.show"]
    },
    "publisher": {"@type": "Person", "name": "Joseph Thacker",
      "logo": {"@type": "ImageObject", "url": "{{ '/assets/images/joseph_circle.png' | absolute_url }}"}}
  }
  </script>
  {% endif %}

  {% include custom-head.html %}
</head>
